<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Edit JSON in SharePoint</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            margin: 0;
            padding: 12px;
            color: #2c2c2c;
        }
        .status {
            padding: 8px 10px;
            border-radius: 4px;
            background: #f5f5f5;
            border: 1px solid #ddd;
        }
        .status.error {
            border-color: #d92b2b;
            background: #fff5f5;
            color: #a20000;
        }
        .status.ok {
            border-color: #1473e6;
            background: #e6f0ff;
            color: #0b3b80;
        }
    </style>
</head>
<body>
<div id="status" class="status">Checking JSON location…</div>

<script>
  (async () => {
    const statusEl = document.getElementById('status');

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    const params = new URLSearchParams(window.location.search);

    const owner = params.get('owner');
    const repo = params.get('repo');
    const ref = params.get('ref');
    const referrer = params.get('referrer');

    if (!owner || !repo || !ref || !referrer) {
      setStatus('Missing Sidekick config parameters (owner/repo/ref/referrer). Check passConfig/passReferrer in sidekick config.', 'error');
      return;
    }

    let jsonUrl;
    try {
      jsonUrl = new URL(referrer);
    } catch (e) {
      setStatus('Invalid referrer URL passed from Sidekick.', 'error');
      return;
    }

    // Path of the current JSON, e.g. "/foo/bar/data.json"
    const pathname = jsonUrl.pathname;

    // Build admin status URL to check if this JSON exists in DA/EDS
    // Reference: https://admin.hlx.page/status/{owner}/{repo}/{ref}/{path}
    const adminUrl = `https://admin.hlx.page/status/${owner}/${repo}/${encodeURIComponent(ref)}${pathname}`;

    try {
      const resp = await fetch(adminUrl, { credentials: 'include' });
      if (!resp.ok) {
        setStatus(`Admin status check failed (${resp.status}). Not redirecting to SharePoint.`, 'error');
        return;
      }

      const data = await resp.json();

      const previewStatus = data.preview && data.preview.status;
      const liveStatus = data.live && data.live.status;

      const existsInDa = (previewStatus && previewStatus === 200) ||
          (liveStatus && liveStatus === 200);

      if (!existsInDa) {
        setStatus('This JSON is not backed by DA/Helix content. Skipping SharePoint redirect.', 'error');
        return;
      }

      const spBase = 'https://adobe.sharepoint.com/:f:/r/sites/adobecom/DA%20Docs/da-playground';

      // Convert the pathname into a SharePoint-friendly suffix.
      // - strip leading '/'
      // - URL-encode it
      const spPath = encodeURIComponent(pathname.replace(/^\/+/, ''));

      const sharepointUrl = `${spBase}/${spPath}`;

      setStatus('JSON found in DA; redirecting to SharePoint…', 'ok');

      // Redirect the top window (the actual page, not just the iframe)
      window.top.location.href = sharepointUrl;
    } catch (e) {
      console.error(e);
      setStatus('Error while checking admin status or redirecting to SharePoint. See console for details.', 'error');
    }
  })();
</script>
</body>
</html>
